<svg viewBox="0 0 900 1160" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5c5c68"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#e5484d"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10a37a"/>
    </marker>
  </defs>

  <rect width="900" height="1160" fill="#16161d"/>
  <text x="450" y="46" text-anchor="middle" fill="#f2f2f5" font-size="24" font-weight="700">Ticket Triage Orchestrator — Data Flow</text>
  <text x="450" y="68" text-anchor="middle" fill="#7d7d8a" font-size="12">n8n · OpenRouter · Google Sheets · Slack</text>

  <!-- Trigger -->
  <rect x="300" y="92" width="300" height="58" rx="10" fill="#4f7de0"/>
  <text x="450" y="126" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">📝 Form: Submit a Support Ticket</text>
  <line x1="450" y1="150" x2="450" y2="182" stroke="#5c5c68" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Edit fields -->
  <rect x="320" y="182" width="260" height="48" rx="10" fill="#2c2c36"/>
  <text x="450" y="211" text-anchor="middle" fill="#e4e4ea" font-size="13">Edit Fields · stamp ticket_id</text>
  <line x1="450" y1="230" x2="450" y2="264" stroke="#5c5c68" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- AI agent -->
  <rect x="280" y="264" width="340" height="68" rx="10" fill="#8a5cf0"/>
  <text x="450" y="293" text-anchor="middle" fill="#fff" font-size="16" font-weight="600">🤖 AI Agent</text>
  <text x="450" y="314" text-anchor="middle" fill="#e6dbff" font-size="11">OpenRouter · openai/gpt-oss-20b</text>

  <!-- KB sheet -->
  <rect x="656" y="270" width="204" height="56" rx="8" fill="#10a37a"/>
  <text x="758" y="292" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">KnowledgeBase sheet</text>
  <text x="758" y="309" text-anchor="middle" fill="#c9f3e6" font-size="10">Topic → Solution</text>
  <line x1="656" y1="298" x2="620" y2="298" stroke="#10a37a" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrowGreen)"/>
  <text x="638" y="288" text-anchor="middle" fill="#7fd9be" font-size="9">reads</text>

  <line x1="450" y1="332" x2="450" y2="366" stroke="#5c5c68" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Decision -->
  <polygon points="450,366 562,424 450,482 338,424" fill="#f0a83e"/>
  <text x="450" y="429" text-anchor="middle" fill="#1c1710" font-size="14" font-weight="700">decision?</text>

  <!-- escalate branch -->
  <line x1="358" y1="444" x2="228" y2="496" stroke="#e5484d" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="268" y="470" fill="#f39a9e" font-size="12" font-weight="600">escalate</text>

  <rect x="58" y="496" width="340" height="60" rx="10" fill="#a5333a"/>
  <text x="228" y="523" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">🚨 Slack alert → #ops-triage</text>
  <text x="228" y="542" text-anchor="middle" fill="#f6c7ca" font-size="11">AI's reason + live review link</text>
  <line x1="228" y1="556" x2="228" y2="590" stroke="#5c5c68" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="98" y="590" width="260" height="52" rx="24" fill="#2c2c36"/>
  <text x="228" y="621" text-anchor="middle" fill="#e4e4ea" font-size="12">⏸ Wait for reviewer form</text>
  <line x1="228" y1="642" x2="228" y2="676" stroke="#5c5c68" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="78" y="676" width="300" height="54" rx="10" fill="#33333f"/>
  <text x="228" y="698" text-anchor="middle" fill="#e4e4ea" font-size="12" font-weight="600">Call Log &amp; Notify</text>
  <text x="228" y="716" text-anchor="middle" fill="#a3a3ae" font-size="10">status = reviewer's decision</text>

  <!-- auto-resolve branch -->
  <line x1="542" y1="444" x2="672" y2="496" stroke="#10a37a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="632" y="470" fill="#7fd9be" font-size="12" font-weight="600">auto_resolve</text>

  <rect x="538" y="496" width="300" height="54" rx="10" fill="#33333f"/>
  <text x="688" y="518" text-anchor="middle" fill="#e4e4ea" font-size="12" font-weight="600">Call Log &amp; Notify</text>
  <text x="688" y="536" text-anchor="middle" fill="#a3a3ae" font-size="10">status = Auto-Resolved</text>

  <!-- merge -->
  <line x1="228" y1="730" x2="228" y2="762" stroke="#5c5c68" stroke-width="2"/>
  <line x1="688" y1="550" x2="688" y2="762" stroke="#5c5c68" stroke-width="2"/>
  <line x1="228" y1="762" x2="688" y2="762" stroke="#5c5c68" stroke-width="2"/>
  <line x1="458" y1="762" x2="458" y2="796" stroke="#5c5c68" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="308" y="796" width="300" height="54" rx="10" fill="#0e8a68"/>
  <text x="458" y="828" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Append row → Tickets sheet</text>
  <line x1="458" y1="850" x2="458" y2="884" stroke="#5c5c68" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Slack, brand purple -->
  <rect x="308" y="884" width="300" height="54" rx="10" fill="#611f69"/>
  <text x="458" y="916" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">✅ Slack confirmation</text>

  <!-- legend -->
  <g transform="translate(40,984)">
    <rect width="820" height="140" rx="10" fill="#1d1d25" stroke="#33333f"/>
    <text x="20" y="28" fill="#8a8a96" font-size="11" font-weight="700" letter-spacing="1">LEGEND</text>
    <rect x="20" y="42" width="13" height="13" rx="3" fill="#4f7de0"/><text x="41" y="53" fill="#c7c7d1" font-size="12">Trigger</text>
    <rect x="150" y="42" width="13" height="13" rx="3" fill="#8a5cf0"/><text x="171" y="53" fill="#c7c7d1" font-size="12">AI processing</text>
    <rect x="320" y="42" width="13" height="13" rx="3" fill="#f0a83e"/><text x="341" y="53" fill="#c7c7d1" font-size="12">Branch point</text>
    <rect x="470" y="42" width="13" height="13" rx="3" fill="#a5333a"/><text x="491" y="53" fill="#c7c7d1" font-size="12">Escalation path</text>
    <rect x="650" y="42" width="13" height="13" rx="3" fill="#0e8a68"/><text x="671" y="53" fill="#c7c7d1" font-size="12">Sheets</text>
    <rect x="20" y="80" width="13" height="13" rx="3" fill="#611f69"/><text x="41" y="91" fill="#c7c7d1" font-size="12">Slack</text>
    <text x="150" y="91" fill="#6a6a76" font-size="11">Full node-level version: screenshots/02 and /03</text>
  </g>
</svg>
